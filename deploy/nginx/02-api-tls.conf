# Stage 2 — HTTPS for minecraftapi only (Let’s Encrypt on this box)
# Requires: /etc/letsencrypt/live/minecraftapi.thecabal.app/

server {
    listen 80;
    server_name minecraftapi.thecabal.app;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name minecraftapi.thecabal.app;

    ssl_certificate     /etc/letsencrypt/live/minecraftapi.thecabal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minecraftapi.thecabal.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4866;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
