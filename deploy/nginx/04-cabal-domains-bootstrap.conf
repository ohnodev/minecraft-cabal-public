# First-time / renewal-safe HTTP only (no TLS paths required).
# Use until Let's Encrypt certs exist, then switch to 05-cabal-domains-tls.conf.
#
#   mkdir -p /var/www/certbot
#   nginx -t && systemctl reload nginx
#   certbot certonly --webroot -w /var/www/certbot \
#     -d minecraftapi.thecabal.app -d minecraft.thecabal.app

server {
    listen 80;
    listen [::]:80;
    server_name minecraftapi.thecabal.app;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:4866;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name minecraft.thecabal.app;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        default_type text/plain;
        return 200 'Cabal SMP — connect with Minecraft Java on port 25565.\n';
    }
}
