# Final HTTPS + HTTP→HTTPS after certs exist at:
#   /etc/letsencrypt/live/minecraftapi.thecabal.app/{fullchain,privkey}.pem
# (first -d name from certbot; both hostnames must be on that cert’s SAN list.)
#
# Disable 04-cabal-domains-bootstrap.conf when enabling this file to avoid
# duplicate listen/server_name on :80.

server {
    listen 80;
    listen [::]:80;
    server_name minecraftapi.thecabal.app;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name minecraftapi.thecabal.app;

    ssl_certificate     /etc/letsencrypt/live/minecraftapi.thecabal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minecraftapi.thecabal.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:4866;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name minecraft.thecabal.app;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name minecraft.thecabal.app;

    ssl_certificate     /etc/letsencrypt/live/minecraftapi.thecabal.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minecraftapi.thecabal.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        default_type text/plain;
        return 200 'Cabal SMP — connect with Minecraft Java on port 25565 (Bedrock: UDP 19132 if enabled).\n';
    }
}
