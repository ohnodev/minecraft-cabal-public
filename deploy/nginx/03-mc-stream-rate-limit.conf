# Cabal SMP — Minecraft Java TCP proxy (stream context only).
#
# Install: copy or symlink into /etc/nginx/streams-enabled/ (one file is fine).
# Parent nginx.conf must contain exactly one top-level `stream { ... }` that
# includes this directory — do NOT nest stream inside `http { }`.
#
# limit_conn limits concurrent TCP connections per key (here: per client IP),
# not packets/sec or SYN rate. For strict SYN/flood mitigation, use nftables /
# firewall (e.g. synproxy, connlimit) in addition to this layer.
#
# Host layout (recommended):
#   - Docker publishes Java MC on 127.0.0.1:25566 only (see docker-compose).
#   - nginx listens on 0.0.0.0:25565 and streams to 127.0.0.1:25566.
#   - Players still connect to hostname:25565 as usual.
#
# N was chosen: 8 simultaneous connections per IP — conservative against
# connection spam while tolerating NAT (household / small school sharing one
# public IPv4). Staged / strict environments may use 3 instead.

limit_conn_zone $binary_remote_addr zone=mc_conn_per_ip:10m;
limit_conn_log_level notice;

log_format mc_stream '$remote_addr $time_local $protocol $status '
                     '$bytes_sent $bytes_received $session_time $upstream_addr';

access_log /var/log/nginx/minecraft-stream-access.log mc_stream;

upstream minecraft_backend {
    server 127.0.0.1:25566;
}

server {
    listen 25565;
    listen [::]:25565;

    proxy_pass minecraft_backend;

    # Per-IP concurrent TCP sessions (see note above).
    limit_conn mc_conn_per_ip 8;

    proxy_connect_timeout 3s;
    preread_timeout 10s;
    proxy_timeout 12h;
}
