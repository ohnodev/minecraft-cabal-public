# Cabal Minecraft server — bind-mounts ./server so `git pull origin main` updates mods/config, then:
#   docker compose up -d --build
#
# Requires a populated Fabric server tree under ./server (fabric-server-launch.jar, server.jar, libraries/, mods/).
# See docker/README.md for memory, ports, and RCON.

services:
  minecraft:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cabal-minecraft:local
    container_name: cabal-minecraft
    restart: unless-stopped
    ports:
      - "${MC_HOST_PORT:-25565}:${MC_SERVER_PORT:-25565}"
      - "${MC_RCON_HOST_PORT:-25575}:${MC_RCON_PORT:-25575}"
      # Geyser Bedrock listener (UDP): only host side is overrideable here.
      # Container-side listener stays on 19132 unless Geyser config is changed.
      - "${MC_BEDROCK_HOST_PORT:-19132}:19132/udp"
    environment:
      MC_SERVER_DIR: /data
      MC_SERVER_PORT: "${MC_SERVER_PORT:-25565}"
      MC_RCON_PORT: "${MC_RCON_PORT:-25575}"
      RCON_PASSWORD: "${RCON_PASSWORD:-}"
      MC_MIN_MEM: "${MC_MIN_MEM:-4G}"
      MC_MAX_MEM: "${MC_MAX_MEM:-4G}"
    volumes:
      - ./server:/data
    stdin_open: true
    tty: true
    stop_grace_period: 90s
